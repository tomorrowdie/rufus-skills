<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: #FFFFFF; color: #1A1A1A; }
  .canvas { width: 1600px; height: 1600px; padding: 80px; position: relative; overflow: hidden; }
  .brand-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #2563eb, #16a34a); }
  .title { font-size: 48px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  .subtitle { font-size: 24px; color: #6B7280; font-weight: 400; margin-bottom: 48px; }
  .product-name { font-size: 28px; font-weight: 700; color: #2563eb; margin-bottom: 40px; }
  .ocr-text { font-size: 28px; font-weight: 600; line-height: 1.5; color: #1A1A1A; }
  .ocr-text-sm { font-size: 24px; font-weight: 500; line-height: 1.5; color: #1A1A1A; }
  .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .spec-card { background: #F8FAFC; border: 1px solid #E5E7EB; border-radius: 16px; padding: 32px; }
  .spec-label { font-size: 18px; color: #6B7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .spec-value { font-size: 36px; font-weight: 800; }
  .spec-unit { font-size: 20px; color: #6B7280; font-weight: 400; }
  .feature-row { display: flex; align-items: flex-start; gap: 24px; padding: 28px 0; border-bottom: 1px solid #E5E7EB; }
  .feature-row:last-child { border-bottom: none; }
  .feature-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #DBEAFE, #BFDBFE); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
  .feature-text h3 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .feature-text p { font-size: 22px; color: #4B5563; line-height: 1.4; }
  .comp-table { width: 100%; border-collapse: collapse; }
  .comp-table th { font-size: 22px; font-weight: 700; padding: 20px 16px; text-align: center; background: #F8FAFC; }
  .comp-table th.highlight { background: linear-gradient(135deg, #DBEAFE, #EFF6FF); color: #2563eb; }
  .comp-table td { font-size: 24px; padding: 18px 16px; text-align: center; border-bottom: 1px solid #E5E7EB; }
  .comp-table td.highlight { background: #EFF6FF; font-weight: 700; color: #2563eb; }
  .comp-table td.win { color: #16a34a; font-weight: 700; }
  .comp-header { font-size: 20px; font-weight: 600; padding: 16px; text-align: left; color: #6B7280; background: #F9FAFB; }
  .footer-bar { position: absolute; bottom: 40px; left: 80px; right: 80px; font-size: 18px; color: #9CA3AF; display: flex; justify-content: space-between; }
</style></head><body><div class="canvas"><div class="brand-bar"></div><div class="title">Technical Specifications</div><div class="product-name">Anker Nano Power Bank</div><div class="spec-grid"><div class="spec-card"><div class="spec-label">Battery Capacity</div><div class="spec-value">5000<span class="spec-unit"> mAh</span></div></div><div class="spec-card"><div class="spec-label">Energy</div><div class="spec-value">18.5<span class="spec-unit"> Wh</span></div></div><div class="spec-card"><div class="spec-label">Output Ports</div><div class="spec-value">1</div></div><div class="spec-card"><div class="spec-label">USB-C Output</div><div class="spec-value">20W Max</div></div><div class="spec-card"><div class="spec-label">Wireless Output</div><div class="spec-value">15W Qi2 MagSafe</div></div><div class="spec-card"><div class="spec-label">Total Output</div><div class="spec-value">20W max</div></div><div class="spec-card"><div class="spec-label">Weight</div><div class="spec-value">122<span class="spec-unit"> g</span></div></div><div class="spec-card"><div class="spec-label">Dimensions</div><div class="spec-value">4.0 x 2.8 x 0.34</div></div></div><div class="footer-bar"><span>All specifications verified &bull; OCR-optimized for Amazon Rufus</span><span>B0FKN7X7HM</span></div></div></body></html>
